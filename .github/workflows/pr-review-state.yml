name: PR Review State Automation

on:
  pull_request_target:
    types:
      - review_requested
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  manage-pr-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Manage PR state labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const eventName = context.eventName;

            async function getLabels() {
              const { data } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              return data.map(l => l.name);
            }

            async function removeLabel(name, existingLabels) {
              if (existingLabels.includes(name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: name
                });
              }
            }

            async function addLabel(name, existingLabels) {
              if (!existingLabels.includes(name)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: [name]
                });
              }
            }

            const labels = await getLabels();

            if (eventName === "pull_request" &&
                context.payload.action === "review_requested") {

              await removeLabel("waiting for changes", labels);
              await removeLabel("ready", labels);
              await addLabel("waiting for review", labels);
              return;
            }

            if (eventName === "pull_request_review" &&
                context.payload.action === "submitted") {

              const reviewState = context.payload.review.state;

              if (reviewState === "changes_requested") {
                await removeLabel("waiting for review", labels);
                await removeLabel("ready", labels);
                await addLabel("waiting for changes", labels);
              }

              if (reviewState === "approved") {
                await removeLabel("waiting for review", labels);
                await removeLabel("waiting for changes", labels);
                await addLabel("ready", labels);
              }
            }